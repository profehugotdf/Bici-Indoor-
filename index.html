<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FE-C Â· Prueba 1</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --line:#273040;
    --tx:#e6edf3; --dim:#8b98a9; --acc:#4cc2ff; --ok:#3fb950; --warn:#f0883e; --err:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--tx);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 40px}
  h1{font-size:18px;margin:6px 0 2px}
  .sub{color:var(--dim);font-size:13px;margin:0 0 14px}
  button{font:inherit;color:var(--tx);background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;min-height:52px;font-weight:600}
  button:active{transform:translateY(1px)}
  .primary{width:100%;background:var(--acc);color:#04121c;border-color:transparent;font-size:16px}
  .primary[disabled]{opacity:.5}
  .state{margin:12px 0;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--panel);font-size:14px;display:flex;align-items:center;gap:10px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--dim);flex:0 0 auto}
  .dot.searching{background:var(--warn);animation:pulse 1s infinite}
  .dot.live{background:var(--ok)}
  .dot.err{background:var(--err)}
  @keyframes pulse{50%{opacity:.35}}
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0}
  .m{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center}
  .m .v{font-size:30px;font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums}
  .m .u{color:var(--dim);font-size:12px;margin-top:4px}
  .m .l{color:var(--dim);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin:14px 0}
  .card h2{font-size:14px;margin:0 0 12px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
  .grades{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .grades button{padding:12px 4px;min-height:48px}
  .grades button.on{background:var(--acc);color:#04121c;border-color:transparent}
  .slider{width:100%;margin:16px 0 4px;accent-color:var(--acc);height:34px}
  .gnow{font-size:22px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
  .row{display:flex;gap:10px;align-items:center}
  .row label{color:var(--dim);font-size:14px;flex:1}
  input[type=number]{font:inherit;color:var(--tx);background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:10px;width:100px;text-align:right}
  pre#log{background:#0a0d12;border:1px solid var(--line);border-radius:12px;padding:12px;
    font-size:12px;line-height:1.5;max-height:240px;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:14px 0 0}
  .log-ok{color:var(--ok)} .log-err{color:var(--err)} .log-tx{color:var(--acc)} .log-dim{color:var(--dim)}
  .note{color:var(--warn);font-size:13px;margin:10px 0;display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>FE-C Â· Prueba 1</h1>
  <p class="sub">Bring-up WebUSB â†’ stick ANT+ â†’ rodillo. Leer potencia y mandar pendiente.</p>

  <div id="httpwarn" class="note">Ojo: WebUSB necesita HTTPS. SubĂ­ este archivo a tu GitHub Pages; desde un archivo local (file://) no va a andar.</div>

  <button id="btn" class="primary">Conectar stick</button>

  <div class="state"><span id="dot" class="dot"></span><span id="stateTx">Desconectado</span></div>

  <div class="metrics">
    <div class="m"><div class="l">Potencia</div><div class="v" id="pw">â€”</div><div class="u">W</div></div>
    <div class="m"><div class="l">Cadencia</div><div class="v" id="cad">â€”</div><div class="u">rpm</div></div>
    <div class="m"><div class="l">Velocidad</div><div class="v" id="spd">â€”</div><div class="u">km/h</div></div>
  </div>

  <div class="card">
    <h2>Pendiente</h2>
    <div class="grades" id="grades"></div>
    <input type="range" min="-10" max="20" step="0.5" value="0" class="slider" id="slider" disabled>
    <div class="gnow" id="gnow">0.0 %</div>
    <div class="row" style="margin-top:14px">
      <label for="weight">Tu peso (kg) â€” para el cĂˇlculo de carga</label>
      <input type="number" id="weight" value="75" min="30" max="150" step="0.5">
    </div>
  </div>

  <pre id="log"></pre>
</div>

<script>
"use strict";

// ---------- Constantes ANT ----------
const ANT_SYNC = 0xA4;
const ANTPLUS_KEY = [0xB9,0xA5,0x21,0xFB,0xBD,0x72,0xC3,0x45];
const NET = 0x00, CH = 0x00;
const FEC_DEVTYPE = 17, RF_FREQ = 57, PERIOD = 8192; // 4 Hz

const MSG = {
  RESET:0x4A, NET_KEY:0x46, ASSIGN:0x42, CH_ID:0x51, RF:0x45, PERIOD:0x43,
  OPEN:0x4B, CLOSE:0x4C, UNASSIGN:0x41,
  BROADCAST:0x4E, ACK:0x4F, BURST:0x50,
  EVENT:0x40, STARTUP:0x6F, CAPS:0x54, VERSION:0x3E
};

const USB_FILTERS = [
  {vendorId:0x0fcf, productId:0x1008}, // ANT USBStick2 (el tuyo)
  {vendorId:0x0fcf, productId:0x1009}, // ANTUSB-m
  {vendorId:0x0fcf}
];

// ---------- Estado ----------
let device=null, epIn=0, epOut=0, ifaceNum=0;
let connected=false, reading=false;
let curGrade=0, keepAlive=null;
let rxBuf=[];

// ---------- UI ----------
const $=id=>document.getElementById(id);
const btn=$("btn"), dot=$("dot"), stateTx=$("stateTx"), logEl=$("log");
const pwEl=$("pw"), cadEl=$("cad"), spdEl=$("spd");
const slider=$("slider"), gnow=$("gnow"), gradesEl=$("grades"), weightEl=$("weight");

function log(msg,cls){
  const t=new Date().toTimeString().slice(0,8);
  const line=document.createElement("div");
  if(cls) line.className=cls;
  line.textContent=`${t}  ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop=logEl.scrollHeight;
}
function setState(txt,kind){ stateTx.textContent=txt; dot.className="dot"+(kind?" "+kind:""); }

// Botones rĂˇpidos de pendiente
const QUICK=[-5,0,3,6,9,12];
QUICK.forEach(g=>{
  const b=document.createElement("button");
  b.textContent=(g>0?"+":"")+g+"%"; b.dataset.g=g; b.disabled=true;
  b.onclick=()=>applyGrade(g,true);
  gradesEl.appendChild(b);
});
slider.oninput=()=>{ gnow.textContent=parseFloat(slider.value).toFixed(1)+" %"; };
slider.onchange=()=>applyGrade(parseFloat(slider.value),false);

function markQuick(g){
  [...gradesEl.children].forEach(b=>b.classList.toggle("on", parseFloat(b.dataset.g)===g));
}
function setControlsEnabled(on){
  slider.disabled=!on;
  [...gradesEl.children].forEach(b=>b.disabled=!on);
}

// ---------- Helpers de mensajes ANT ----------
function antMsg(id, data){
  const len=data.length;
  const buf=new Uint8Array(4+len);
  buf[0]=ANT_SYNC; buf[1]=len; buf[2]=id;
  buf.set(data,3);
  let cs=0; for(let i=0;i<3+len;i++) cs^=buf[i];
  buf[3+len]=cs;
  return buf;
}
async function send(bytes){
  try{ await device.transferOut(epOut, bytes); }
  catch(e){ log("TX error: "+e.message,"log-err"); }
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ---------- ConexiĂłn ----------
async function connect(){
  if(!("usb" in navigator)){ log("Este navegador no soporta WebUSB. UsĂˇ Brave o Chrome.","log-err"); return; }
  try{
    device=await navigator.usb.requestDevice({filters:USB_FILTERS});
    log("Stick: "+(device.productName||"?")+" ["+
      device.vendorId.toString(16)+":"+device.productId.toString(16)+"]");
    await device.open();
    if(!device.configuration) await device.selectConfiguration(1);

    // Buscar interfaz con endpoints bulk
    let found=null;
    for(const itf of device.configuration.interfaces){
      const alt=itf.alternate;
      const din=alt.endpoints.find(e=>e.direction==="in"&&e.type==="bulk");
      const dout=alt.endpoints.find(e=>e.direction==="out"&&e.type==="bulk");
      if(din&&dout){ found={itf,din,dout}; break; }
    }
    if(!found) throw new Error("No encontrĂ© endpoints bulk in/out");
    ifaceNum=found.itf.interfaceNumber; epIn=found.din.endpointNumber; epOut=found.dout.endpointNumber;
    await device.claimInterface(ifaceNum);
    log("Interfaz "+ifaceNum+" reclamada Â· IN=0x"+epIn.toString(16)+" OUT=0x"+epOut.toString(16),"log-ok");

    connected=true; btn.textContent="Desconectar";
    setControlsEnabled(true);
    readLoop();
    await initAnt();
  }catch(e){
    log("No se pudo conectar: "+e.message,"log-err");
    if(/claim|busy|access/i.test(e.message))
      log("ProbĂˇ forzar detenciĂłn de 'ANT USB Service' y 'ANT Radio Service' y reintentĂˇ.","log-dim");
    setState("Error","err");
    await cleanup();
  }
}

async function initAnt(){
  setState("Inicializando ANTâ€¦","searching");
  await send(antMsg(MSG.RESET,[0x00]));        await sleep(600);
  await send(antMsg(MSG.NET_KEY,[NET,...ANTPLUS_KEY])); await sleep(60);
  await send(antMsg(MSG.ASSIGN,[CH,0x00,NET]));        await sleep(60); // 0x00 = slave receive
  await send(antMsg(MSG.CH_ID,[CH,0x00,0x00,FEC_DEVTYPE,0x00])); await sleep(60); // wildcard
  await send(antMsg(MSG.RF,[CH,RF_FREQ]));             await sleep(60);
  await send(antMsg(MSG.PERIOD,[CH,PERIOD&0xFF,(PERIOD>>8)&0xFF])); await sleep(60);
  await send(antMsg(MSG.OPEN,[CH]));
  log("Canal abierto. Buscando rodillo FE-Câ€¦ (pedaleĂˇ un poco)","log-ok");
  setState("Buscando rodilloâ€¦ pedaleĂˇ","searching");
  sendUserConfig();
}

async function readLoop(){
  reading=true;
  while(connected){
    try{
      const r=await device.transferIn(epIn,64);
      if(r.data && r.data.byteLength) ingest(new Uint8Array(r.data.buffer));
    }catch(e){
      if(connected) log("RX error: "+e.message,"log-err");
      break;
    }
  }
  reading=false;
}

// ---------- Parseo de frames ANT ----------
function ingest(bytes){
  for(const b of bytes) rxBuf.push(b);
  while(rxBuf.length>=1){
    if(rxBuf[0]!==ANT_SYNC){ rxBuf.shift(); continue; }
    if(rxBuf.length<2) return;
    const len=rxBuf[1];
    const total=len+4;
    if(rxBuf.length<total) return;
    const frame=rxBuf.slice(0,total);
    rxBuf=rxBuf.slice(total);
    handleFrame(frame);
  }
}

let sawTrainer=false;
function handleFrame(f){
  const id=f[2];
  const data=f.slice(3,3+f[1]);
  if(id===MSG.BROADCAST || id===MSG.ACK){
    // data[0]=canal, data[1..8]=payload (page + 7)
    const payload=data.slice(1);
    if(!sawTrainer){ sawTrainer=true; setState("Conectado al rodillo","live"); log("ÂˇRodillo encontrado!","log-ok"); }
    handlePage(payload);
  }else if(id===MSG.STARTUP){
    log("ANT reset OK","log-dim");
  }else if(id===MSG.EVENT){
    // data: [canal, msgId, code]
    const code=data[2];
    if(data[1]===0x01){ // RF event
      if(code===0x01) { /* EVENT_RX_SEARCH_TIMEOUT */ log("BĂşsqueda expirĂł, reintentandoâ€¦","log-dim"); }
    }
  }
}

function handlePage(p){
  const page=p[0];
  if(page===0x19){ // Specific Trainer Data
    const cad=p[2];
    const instPower=p[5] | ((p[6]&0x0F)<<8);
    if(cad!==0xFF) cadEl.textContent=cad;
    if(instPower!==0xFFF) pwEl.textContent=instPower;
  }else if(page===0x10){ // General FE Data
    const speed=(p[4] | (p[5]<<8)); // 0.001 m/s
    if(speed!==0xFFFF) spdEl.textContent=(speed*0.001*3.6).toFixed(1);
  }
}

// ---------- Control: pendiente y config de usuario ----------
function sendUserConfig(){
  const kg=Math.max(20,Math.min(200, parseFloat(weightEl.value)||75));
  const w=Math.round(kg*100); // 0.01 kg
  // page 55: peso usuario; resto (bici/rueda/relaciĂłn) invĂˇlido = 0xFF
  send(antMsg(MSG.ACK,[CH,0x37, w&0xFF,(w>>8)&0xFF, 0xFF,0xFF,0xFF,0xFF,0xFF]));
  log("Config de usuario enviada Â· "+kg+" kg","log-tx");
}

function gradePage(gradePct){
  const raw=Math.round((gradePct+200)/0.01); // 0.01%, offset -200
  const lo=raw&0xFF, hi=(raw>>8)&0xFF;
  const crr=0x50; // ~0.004 rodadura
  return antMsg(MSG.ACK,[CH,0x33, 0xFF,0xFF,0xFF,0xFF, lo,hi, crr]);
}
function applyGrade(g, fromButton){
  curGrade=g;
  slider.value=g; gnow.textContent=g.toFixed(1)+" %";
  markQuick(fromButton?g:NaN);
  send(gradePage(g));
  log("â†’ pendiente "+g.toFixed(1)+"%","log-tx");
}

// ReenvĂ­o periĂłdico para mantener la pendiente aplicada
function startKeepAlive(){
  stopKeepAlive();
  keepAlive=setInterval(()=>{ if(connected&&sawTrainer) send(gradePage(curGrade)); },3000);
}
function stopKeepAlive(){ if(keepAlive){clearInterval(keepAlive);keepAlive=null;} }

weightEl.onchange=()=>{ if(connected) sendUserConfig(); };

// ---------- DesconexiĂłn ----------
async function cleanup(){
  connected=false; sawTrainer=false; rxBuf=[]; stopKeepAlive();
  setControlsEnabled(false);
  btn.textContent="Conectar stick";
  pwEl.textContent=cadEl.textContent=spdEl.textContent="â€”";
  try{
    if(device){
      try{ await send(antMsg(MSG.CLOSE,[CH])); }catch(_){}
      try{ await device.releaseInterface(ifaceNum); }catch(_){}
      try{ await device.close(); }catch(_){}
    }
  }catch(_){}
  device=null;
}
async function disconnect(){ log("Desconectandoâ€¦","log-dim"); await cleanup(); setState("Desconectado"); }

btn.onclick=()=>{ connected?disconnect():connect(); };
navigator.usb && navigator.usb.addEventListener&&navigator.usb.addEventListener("disconnect",e=>{
  if(device&&e.device===device){ log("Stick desconectado fĂ­sicamente","log-err"); cleanup(); setState("Desconectado"); }
});

// Arrancar keep-alive cuando aparezca el rodillo
setInterval(()=>{ if(sawTrainer&&!keepAlive) startKeepAlive(); },1000);

// Aviso HTTPS
if(location.protocol==="file:"){ $("httpwarn").style.display="block"; }
if(!("usb" in navigator)){ log("WebUSB no disponible en este navegador.","log-err"); }
</script>
</body>
</html>
