<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FE-C · Prueba 1b</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171c24; --line:#273040;
    --tx:#e6edf3; --dim:#8b98a9; --acc:#4cc2ff; --ok:#3fb950; --warn:#f0883e; --err:#f85149;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--tx);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-text-size-adjust:100%}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 40px}
  h1{font-size:18px;margin:6px 0 2px}
  .sub{color:var(--dim);font-size:13px;margin:0 0 14px}
  button{font:inherit;color:var(--tx);background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:14px 16px;min-height:52px;font-weight:600}
  button:active{transform:translateY(1px)}
  .primary{width:100%;background:var(--acc);color:#04121c;border-color:transparent;font-size:16px}
  select{font:inherit;color:var(--tx);background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;width:100%;min-height:50px;margin-bottom:10px}
  .state{margin:12px 0;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--panel);font-size:14px;display:flex;align-items:center;gap:10px}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--dim);flex:0 0 auto}
  .dot.searching{background:var(--warn);animation:pulse 1s infinite}
  .dot.live{background:var(--ok)}
  .dot.err{background:var(--err)}
  @keyframes pulse{50%{opacity:.35}}
  .found{margin:0 0 12px;padding:10px 14px;border:1px solid var(--acc);border-radius:12px;
    background:#0f2230;font-size:14px;display:none}
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0}
  .m{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center}
  .m .v{font-size:30px;font-weight:800;line-height:1.05;font-variant-numeric:tabular-nums}
  .m .u{color:var(--dim);font-size:12px;margin-top:4px}
  .m .l{color:var(--dim);font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin:14px 0}
  .card h2{font-size:14px;margin:0 0 12px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
  .grades{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .grades button{padding:12px 4px;min-height:48px}
  .grades button.on{background:var(--acc);color:#04121c;border-color:transparent}
  .slider{width:100%;margin:16px 0 4px;accent-color:var(--acc);height:34px}
  .gnow{font-size:22px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
  .row{display:flex;gap:10px;align-items:center}
  .row label{color:var(--dim);font-size:14px;flex:1}
  input[type=number]{font:inherit;color:var(--tx);background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:10px;width:100px;text-align:right}
  pre#log{background:#0a0d12;border:1px solid var(--line);border-radius:12px;padding:12px;
    font-size:12px;line-height:1.5;max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:14px 0 0}
  .log-ok{color:var(--ok)} .log-err{color:var(--err)} .log-tx{color:var(--acc)} .log-dim{color:var(--dim)} .log-ev{color:var(--warn)}
  .note{color:var(--warn);font-size:13px;margin:10px 0;display:none}
</style>
</head>
<body>
<div class="wrap">
  <h1>FE-C · Prueba 1b</h1>
  <p class="sub">Lectura robusta + modo escaneo para descubrir qué transmite el rodillo.</p>

  <div id="httpwarn" class="note">WebUSB necesita HTTPS o localhost. Desde file:// no anda.</div>

  <select id="mode">
    <option value="17">Buscar rodillo FE-C (control)</option>
    <option value="0">Escanear cualquier dispositivo (diagnóstico)</option>
    <option value="11">Buscar potenciómetro (tipo 11)</option>
  </select>

  <button id="btn" class="primary">Conectar stick</button>

  <div class="state"><span id="dot" class="dot"></span><span id="stateTx">Desconectado</span></div>
  <div class="found" id="found"></div>

  <div class="metrics">
    <div class="m"><div class="l">Potencia</div><div class="v" id="pw">—</div><div class="u">W</div></div>
    <div class="m"><div class="l">Cadencia</div><div class="v" id="cad">—</div><div class="u">rpm</div></div>
    <div class="m"><div class="l">Velocidad</div><div class="v" id="spd">—</div><div class="u">km/h</div></div>
  </div>

  <div class="card">
    <h2>Pendiente</h2>
    <div class="grades" id="grades"></div>
    <input type="range" min="-10" max="20" step="0.5" value="0" class="slider" id="slider" disabled>
    <div class="gnow" id="gnow">0.0 %</div>
    <div class="row" style="margin-top:14px">
      <label for="weight">Tu peso (kg)</label>
      <input type="number" id="weight" value="75" min="30" max="150" step="0.5">
    </div>
  </div>

  <pre id="log"></pre>
</div>

<script>
"use strict";

const ANT_SYNC=0xA4;
const ANTPLUS_KEY=[0xB9,0xA5,0x21,0xFB,0xBD,0x72,0xC3,0x45];
const NET=0x00, CH=0x00, RF_FREQ=57, PERIOD=8192; // 4 Hz (FE-C y potencia entran bien)

const MSG={RESET:0x4A,NET_KEY:0x46,ASSIGN:0x42,CH_ID:0x51,SEARCH_TO:0x44,RF:0x45,PERIOD:0x43,
  OPEN:0x4B,CLOSE:0x4C,REQUEST:0x4D,BROADCAST:0x4E,ACK:0x4F,EVENT:0x40,STARTUP:0x6F};

const DEVTYPES={0:"cualquiera",11:"Potenciómetro",17:"Rodillo FE-C",120:"Frec. cardíaca",
  121:"Vel+Cadencia",122:"Cadencia",123:"Velocidad",15:"Multideporte"};

const USB_FILTERS=[{vendorId:0x0fcf,productId:0x1008},{vendorId:0x0fcf,productId:0x1009},{vendorId:0x0fcf}];

let device=null, epIn=0, epOut=0, inPacket=64, ifaceNum=0;
let connected=false, curGrade=0, keepAlive=null, rxBuf=[];
let searchType=17, locked=false, askedId=false;

const $=id=>document.getElementById(id);
const btn=$("btn"),dot=$("dot"),stateTx=$("stateTx"),logEl=$("log");
const pwEl=$("pw"),cadEl=$("cad"),spdEl=$("spd");
const slider=$("slider"),gnow=$("gnow"),gradesEl=$("grades"),weightEl=$("weight"),foundEl=$("found"),modeEl=$("mode");

function log(m,c){const t=new Date().toTimeString().slice(0,8);const d=document.createElement("div");
  if(c)d.className=c;d.textContent=t+"  "+m;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;}
function setState(t,k){stateTx.textContent=t;dot.className="dot"+(k?" "+k:"");}

const QUICK=[-5,0,3,6,9,12];
QUICK.forEach(g=>{const b=document.createElement("button");b.textContent=(g>0?"+":"")+g+"%";
  b.dataset.g=g;b.disabled=true;b.onclick=()=>applyGrade(g,true);gradesEl.appendChild(b);});
slider.oninput=()=>{gnow.textContent=parseFloat(slider.value).toFixed(1)+" %";};
slider.onchange=()=>applyGrade(parseFloat(slider.value),false);
function markQuick(g){[...gradesEl.children].forEach(b=>b.classList.toggle("on",parseFloat(b.dataset.g)===g));}
function setControls(on){slider.disabled=!on;[...gradesEl.children].forEach(b=>b.disabled=!on);}

function antMsg(id,data){const len=data.length;const buf=new Uint8Array(4+len);
  buf[0]=ANT_SYNC;buf[1]=len;buf[2]=id;buf.set(data,3);
  let cs=0;for(let i=0;i<3+len;i++)cs^=buf[i];buf[3+len]=cs;return buf;}
async function send(b){try{await device.transferOut(epOut,b);}catch(e){log("TX error: "+e.message,"log-err");}}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function connect(){
  if(!("usb" in navigator)){log("Este navegador no soporta WebUSB.","log-err");return;}
  searchType=parseInt(modeEl.value,10);
  try{
    device=await navigator.usb.requestDevice({filters:USB_FILTERS});
    log("Stick: "+(device.productName||"?")+" ["+device.vendorId.toString(16)+":"+device.productId.toString(16)+"]");
    await device.open();
    if(!device.configuration) await device.selectConfiguration(1);
    let f=null;
    for(const itf of device.configuration.interfaces){
      const a=itf.alternate;
      const din=a.endpoints.find(e=>e.direction==="in"&&e.type==="bulk");
      const dout=a.endpoints.find(e=>e.direction==="out"&&e.type==="bulk");
      if(din&&dout){f={itf,din,dout};break;}
    }
    if(!f) throw new Error("Sin endpoints bulk");
    ifaceNum=f.itf.interfaceNumber;epIn=f.din.endpointNumber;epOut=f.dout.endpointNumber;
    inPacket=f.din.packetSize||64;
    await device.claimInterface(ifaceNum);
    log("Interfaz "+ifaceNum+" reclamada · IN=0x"+epIn.toString(16)+" OUT=0x"+epOut.toString(16),"log-ok");
    connected=true;locked=false;askedId=false;foundEl.style.display="none";
    btn.textContent="Desconectar";setControls(true);
    readLoop();
    await initAnt();
  }catch(e){
    log("No se pudo conectar: "+e.message,"log-err");
    if(/claim|busy|access/i.test(e.message))
      log("Forzá detención de 'ANT USB Service' y 'ANT Radio Service' y reintentá.","log-dim");
    setState("Error","err");await cleanup();
  }
}

async function initAnt(){
  const name=DEVTYPES[searchType]||("tipo "+searchType);
  setState("Inicializando ANT…","searching");
  await send(antMsg(MSG.RESET,[0x00]));                 await sleep(600);
  await send(antMsg(MSG.NET_KEY,[NET,...ANTPLUS_KEY]));  await sleep(60);
  await send(antMsg(MSG.ASSIGN,[CH,0x00,NET]));          await sleep(60);
  await send(antMsg(MSG.CH_ID,[CH,0x00,0x00,searchType,0x00])); await sleep(60);
  await send(antMsg(MSG.SEARCH_TO,[CH,0xFF]));           await sleep(60); // búsqueda larga
  await send(antMsg(MSG.RF,[CH,RF_FREQ]));               await sleep(60);
  await send(antMsg(MSG.PERIOD,[CH,PERIOD&0xFF,(PERIOD>>8)&0xFF])); await sleep(60);
  await send(antMsg(MSG.OPEN,[CH]));
  log("Canal abierto ("+name+"). Buscando… PEDALEÁ PAREJO 15-20 s.","log-ok");
  setState("Buscando… pedaleá parejo","searching");
  if(searchType===17) sendUserConfig();
}

async function readLoop(){
  let fails=0;
  while(connected){
    try{
      const r=await device.transferIn(epIn,inPacket);
      if(r.status==="ok"){fails=0;if(r.data&&r.data.byteLength)ingest(new Uint8Array(r.data.buffer));}
      else if(r.status==="stall"){log("stall → clearHalt","log-dim");await device.clearHalt("in",epIn);}
      else if(r.status==="babble"){log("babble","log-dim");}
    }catch(e){
      if(!connected)break;
      fails++;
      // Silencioso las primeras: es normal si el rodillo aún no transmite.
      if(fails===1) log("Sin datos aún, reintentando lectura…","log-dim");
      try{await device.clearHalt("in",epIn);}catch(_){}
      await sleep(150);
      if(fails>=25){log("Demasiados errores seguidos, corto.","log-err");break;}
    }
  }
}

function ingest(bytes){
  for(const b of bytes)rxBuf.push(b);
  while(rxBuf.length>=1){
    if(rxBuf[0]!==ANT_SYNC){rxBuf.shift();continue;}
    if(rxBuf.length<2)return;
    const len=rxBuf[1],total=len+4;
    if(rxBuf.length<total)return;
    const frame=rxBuf.slice(0,total);rxBuf=rxBuf.slice(total);
    handleFrame(frame);
  }
}

function handleFrame(f){
  const id=f[2],data=f.slice(3,3+f[1]);
  if(id===MSG.BROADCAST||id===MSG.ACK){
    if(!locked){locked=true;setState("¡Señal recibida!","live");log("¡Dispositivo transmitiendo!","log-ok");
      if(!askedId){askedId=true;send(antMsg(MSG.REQUEST,[CH,MSG.CH_ID]));}}
    handlePage(data.slice(1));
  }else if(id===MSG.CH_ID){ // respuesta de channel ID
    const dn=data[1]|(data[2]<<8),dt=data[3];
    const nm=DEVTYPES[dt]||("desconocido");
    foundEl.style.display="block";
    foundEl.textContent="Encontrado → tipo "+dt+" ("+nm+"), nº "+dn;
    log("Channel ID → tipo "+dt+" ("+nm+"), nº "+dn,"log-ok");
    if(searchType!==17 && dt===11) log("Es potenciómetro: transmite pero NO se puede controlar. Falta activar FE-C.","log-ev");
    if(dt===17) log("Es FE-C: se puede controlar la pendiente.","log-ok");
  }else if(id===MSG.STARTUP){log("ANT reset OK","log-dim");}
  else if(id===MSG.EVENT){
    const rc=data[1],code=data[2];
    if(rc===0x01){ // evento RF
      if(code===0x01){log("Timeout de búsqueda: no apareció ningún dispositivo.","log-ev");
        setState("No se encontró nada","err");}
      else if(code===0x08){log("Canal cerrado.","log-dim");}
    }
  }
}

function handlePage(p){
  const page=p[0];
  if(page===0x19){const cad=p[2];const pw=p[5]|((p[6]&0x0F)<<8);
    if(cad!==0xFF)cadEl.textContent=cad;if(pw!==0xFFF)pwEl.textContent=pw;}
  else if(page===0x10){const s=p[4]|(p[5]<<8);if(s!==0xFFFF)spdEl.textContent=(s*0.001*3.6).toFixed(1);}
  else if(page===0x52||page===0x51){/* páginas de manufacturer/product info, ignorar */}
}

function sendUserConfig(){
  const kg=Math.max(20,Math.min(200,parseFloat(weightEl.value)||75));
  const w=Math.round(kg*100);
  send(antMsg(MSG.ACK,[CH,0x37,w&0xFF,(w>>8)&0xFF,0xFF,0xFF,0xFF,0xFF,0xFF]));
  log("Config de usuario · "+kg+" kg","log-tx");
}
function gradePage(g){const raw=Math.round((g+200)/0.01);const lo=raw&0xFF,hi=(raw>>8)&0xFF;
  return antMsg(MSG.ACK,[CH,0x33,0xFF,0xFF,0xFF,0xFF,lo,hi,0x50]);}
function applyGrade(g,fromBtn){curGrade=g;slider.value=g;gnow.textContent=g.toFixed(1)+" %";
  markQuick(fromBtn?g:NaN);send(gradePage(g));log("→ pendiente "+g.toFixed(1)+"%","log-tx");}
function startKeepAlive(){stopKeepAlive();keepAlive=setInterval(()=>{if(connected&&locked)send(gradePage(curGrade));},3000);}
function stopKeepAlive(){if(keepAlive){clearInterval(keepAlive);keepAlive=null;}}
weightEl.onchange=()=>{if(connected&&searchType===17)sendUserConfig();};

async function cleanup(){
  connected=false;locked=false;rxBuf=[];stopKeepAlive();setControls(false);
  btn.textContent="Conectar stick";pwEl.textContent=cadEl.textContent=spdEl.textContent="—";
  try{if(device){try{await send(antMsg(MSG.CLOSE,[CH]));}catch(_){}
    try{await device.releaseInterface(ifaceNum);}catch(_){}
    try{await device.close();}catch(_){}}}catch(_){}
  device=null;
}
async function disconnect(){log("Desconectando…","log-dim");await cleanup();setState("Desconectado");}

btn.onclick=()=>{connected?disconnect():connect();};
navigator.usb&&navigator.usb.addEventListener&&navigator.usb.addEventListener("disconnect",e=>{
  if(device&&e.device===device){log("Stick desconectado físicamente","log-err");cleanup();setState("Desconectado");}});
setInterval(()=>{if(locked&&!keepAlive)startKeepAlive();},1000);

if(location.protocol==="file:")$("httpwarn").style.display="block";
if(!("usb" in navigator))log("WebUSB no disponible en este navegador.","log-err");
</script>
</body>
</html>
